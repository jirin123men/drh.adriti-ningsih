<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Online - Dokter Hewan</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f7f1e7;
    color:#5c3a21;
}

/* HEADER */

header{
    width:100%;
    height:75px;
    background:#8b5a35;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* CONTAINER */

.container{
    max-width:750px;
    margin:40px auto;
    padding:20px;
}

/* BOX */

.booking-box{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.booking-box h1{
    text-align:center;
    margin-bottom:30px;
    color:#8b5a35;
    font-size:40px;
}

/* FORM */

input,
select,
textarea{
    width:100%;
    padding:16px;
    margin-top:18px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:18px;
    margin-top:25px;
    border:none;
    border-radius:12px;
    background:#8b5a35;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#6d4326;
}

/* INFO */

.info{
    margin-top:35px;
    background:#f1e5d6;
    padding:25px;
    border-radius:18px;
}

.info h3{
    margin-bottom:15px;
}

.info p{
    margin-bottom:10px;
    font-size:17px;
}

/* BUTTON BACK */

.back{
    display:inline-block;
    margin-top:30px;
    background:#8b5a35;
    color:white;
    padding:14px 30px;
    border-radius:12px;
    text-decoration:none;
    transition:0.3s;
}

.back:hover{
    background:#6d4326;
}

/* FOOTER */

footer{
    background:#5c3a21;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

/* RESPONSIVE */

@media(max-width:768px){

    .booking-box{
        padding:25px;
    }

    .booking-box h1{
        font-size:32px;
    }

}

</style>
</head>
<body>

<!-- HEADER -->

<header>
    Booking Online
</header>

<!-- CONTENT -->

<div class="container">

    <div class="booking-box">

        <h1>Form Booking</h1>

        <form id="bookingForm">

            <input type="text"
            id="nama"
            placeholder="Nama Pemilik"
            required>

            <input type="text"
            id="hewan"
            placeholder="Jenis Hewan"
            required>

            <select id="layanan" required>

                <option value="">
                    Pilih Layanan
                </option>

                <option>
                    Konsultasi
                </option>

                <option>
                    Pengobatan Hewan
                </option>

                <option>
                    Sterilisasi
                </option>

                <option>
                    Vaksin
                </option>

            </select>

            <input type="date"
            id="tanggal"
            required>

            <textarea
            id="keluhan"
            rows="5"
            placeholder="Keluhan Hewan"></textarea>

            <button type="submit">
                Kirim Booking
            </button>

        </form>

        <!-- INFO -->

        <div class="info">

            <h3>Informasi Booking</h3>

            <p>📞 WhatsApp : 0822 7827 2930</p>

            <p>📍 Lokasi : Toari, Kolaka</p>

            <p>🕘 Jam Praktek : 09.00 - 16.00</p>

        </div>

        <center>

        <a href="index.html" class="back">
            Kembali ke Beranda
        </a>

        </center>

    </div>

</div>

<!-- FOOTER -->

<footer>

    <h2>drh. Adriati Ningsih</h2>

    <br>

    <p>Dokter Hewan Profesional</p>

</footer>

<!-- SCRIPT -->

<script>

/* TANGGAL MINIMAL HARI INI */

let today = new Date().toISOString().split("T")[0];

document.getElementById("tanggal")
.setAttribute("min", today);

/* BOOKING WHATSAPP */

document.getElementById("bookingForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let nama =
    document.getElementById("nama").value;

    let hewan =
    document.getElementById("hewan").value;

    let layanan =
    document.getElementById("layanan").value;

    let tanggal =
    document.getElementById("tanggal").value;

    let keluhan =
    document.getElementById("keluhan").value;

    let pesan =
`Halo Dokter, saya ingin booking.

Nama : ${nama}
Hewan : ${hewan}
Layanan : ${layanan}
Tanggal : ${tanggal}
Keluhan : ${keluhan}`;

    let nomor = "6282278272930";

    let url =
`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;

    window.open(url, "_blank");

    alert("Booking berhasil dikirim.");

});

</script>

</body>
</html>
